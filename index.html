<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Radio Timeline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: #0f0f12;
        color: #eaeaf0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        width: min(1200px, 100%);
        margin: 0 auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-sizing: border-box;
      }
      .bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
      .left,
      .right {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 12px;
        background: #17171c;
        border: 1px solid #2a2a34;
        color: #eaeaf0;
        cursor: pointer;
        user-select: none;
      }
      .btn:hover {
        background: #1d1d25;
      }
      .btn.primary {
        background: #2a2a44;
        border-color: #3a3a66;
      }
      .pill {
        padding: 10px 12px;
        border-radius: 12px;
        background: #17171c;
        border: 1px solid #23232b;
      }
      .muted {
        color: #b7b7c6;
        font-size: 13px;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .stage {
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #23232b;
        background: #0b0b0f;
      }
      canvas {
        width: 100%;
        height: auto;
        display: block;
      }
      .hint {
        font-size: 13px;
        color: #b7b7c6;
        line-height: 1.4;
      }
      .card {
        border: 1px solid #23232b;
        background: #17171c;
        border-radius: 14px;
        padding: 14px;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid #2a2a34;
        background: #15151b;
        cursor: pointer;
      }
      .tab.active {
        border-color: #aab0ff;
        background: #1b1b28;
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      .row > * {
        min-width: 0;
      }
      button,
      select {
        white-space: normal;
      }
      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          monospace;
        background: #15151b;
        border: 1px solid #2a2a34;
        padding: 2px 6px;
        border-radius: 8px;
      }
      textarea {
        width: 100%;
        min-height: 160px;
        border-radius: 12px;
        border: 1px solid #2a2a34;
        background: #121217;
        color: #eaeaf0;
        padding: 12px;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          monospace;
        box-sizing: border-box;
      }
      pre {
        overflow-x: auto;
      }
      @media (max-width: 900px) {
        .wrap {
          padding: 12px;
        }
        .row {
          flex-direction: column;
          align-items: flex-start;
        }
        .left,
        .right,
        .tabs {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
